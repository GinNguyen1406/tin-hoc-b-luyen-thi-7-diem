function renderGuide(){
  const topicCounts = Object.entries(DATA.questions.reduce((a,q)=>{a[q.topic]=(a[q.topic]||0)+1;return a;},{})).sort((a,b)=>b[1]-a[1]);
  document.getElementById('guide').innerHTML = `<div class="panel"><h2>Ưu tiên học để lên 7 điểm</h2><p class="note">Không thể cam kết chắc chắn đạt 7 chỉ bằng checklist này, vì đề thi thật có thể random và OCR có thể còn lệch vài chữ. Kế hoạch này dùng để tăng xác suất đạt mục tiêu bằng cách phủ câu mới PDF, chủ đề hay gặp, và câu sai cá nhân.</p><ol><li>Làm tab <b>Câu mới từ PDF</b> ít nhất 2 lượt.</li><li>Làm 50 câu/lượt ở các chủ đề nhiều câu nhất.</li><li>Trước ngày thi, chọn chế độ <b>Làm lại câu sai</b> cho tới khi sai dưới 15%.</li><li>Với câu có nhãn <b>Có hình Excel</b>, mở hình đi kèm và học cách đọc bảng, không chỉ nhớ đáp án.</li></ol><h3>Chủ đề theo số câu</h3><div class="stats">${topicCounts.map(([t,c])=>`<div class="stat"><b>${c}</b>${esc(t)}</div>`).join('')}</div></div>`;
}
document.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(btn.dataset.tab).classList.remove('hidden');});
DATA.questions.forEach((q,i)=>q.id=i+1);
renderQuiz(); renderNew(); renderGuide();
</script>
</body>
</html>
