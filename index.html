  const list=document.getElementById('all-list'); if(list) list.scrollIntoView({behavior:'smooth',block:'start'});
}
function renderAll(){document.getElementById('all').innerHTML = filtersHtml('all'); document.getElementById('all-count').value='all'; startQuiz('all');}
function renderQuiz(){document.getElementById('quiz').innerHTML = filtersHtml('quiz'); startQuiz('quiz');}
function renderNew(){document.getElementById('new').innerHTML = `<div class="panel note">Các câu này xuất hiện trong PDF nhưng không trùng câu hỏi HTML gốc theo bộ lọc tự động. Vẫn nên mở ảnh trang gốc khi câu có ngữ cảnh hình Excel.</div>`+filtersHtml('new'); startQuiz('new');}
function renderExam(){document.getElementById('exam').innerHTML = `<div class="panel note">Phần này giữ câu theo từng PDF nguồn text tốt, không gộp trùng. Dùng để luyện phủ đề và quen cách đảo thứ tự đáp án.</div>`+filtersHtml('exam'); document.getElementById('exam-count').value='100'; startQuiz('exam');}
function renderVisual(){const el=document.getElementById('visual'); if(!el) return; const count=DATA.questions.filter(q=>q.visualQuestion).length; if(!count) return; el.innerHTML = filtersHtml('visual'); document.getElementById('visual-count').value='all'; startQuiz('visual');}
function renderReserve(){document.getElementById('reserve').innerHTML = `<div class="panel note">Đây là các câu bổ sung chưa đủ điều kiện vào bộ chính nhưng đã qua bộ lọc text bẩn. Các câu OCR lỗi rõ ràng đã được tách ra file raw riêng và không còn hiển thị trong giao diện học.</div>`+filtersHtml('reserve'); document.getElementById('reserve-count').value='all'; startQuiz('reserve');}
function renderRaw(){document.getElementById('raw').innerHTML = `<div class="panel note">Phần này lấy từ OCR đã sửa cấu trúc và loại lỗi nặng, nhưng độ tin cậy thấp hơn hai tab trước. Dùng để tăng độ phủ sau khi đã làm chắc bộ chính và câu bổ sung.</div>`+filtersHtml('raw'); document.getElementById('raw-count').value='all'; startQuiz('raw');}
function renderGuide(){
  document.getElementById('guide').innerHTML = `<div class="panel"><h2>Ưu tiên học để lên 7 điểm</h2><p class="note">Không thể cam kết chắc chắn đạt 7 chỉ bằng checklist này, vì đề thi thật có thể random. Kế hoạch này dùng để tăng xác suất đạt mục tiêu bằng cách phủ câu mới PDF, chủ đề hay gặp, và câu sai cá nhân.</p><ol><li>Làm tab <b>Tất cả</b> ít nhất 1 lượt.</li><li>Làm tab <b>Luyện theo đề PDF</b> ít nhất 2 lượt để quen cách đảo đáp án.</li><li>Làm tab <b>Câu mới từ PDF</b> ít nhất 2 lượt.</li><li>Nếu còn thời gian, làm thêm <b>Câu bổ sung đã lọc</b> rồi tới <b>Mở rộng OCR</b>.</li></ol></div>`;
}
document.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(btn.dataset.tab).classList.remove('hidden');if(btn.dataset.tab==='stats')renderStats();});
DATA.questions.forEach((q,i)=>q.id='m'+(i+1));
DATA.reserveQuestions.forEach((q,i)=>q.id='r'+(i+1));
DATA.rawReviewQuestions.forEach((q,i)=>q.id='x'+(i+1));
DATA.examQuestions.forEach((q,i)=>q.id='e'+(i+1));
renderAll(); renderQuiz(); renderNew(); renderExam(); renderVisual(); renderReserve(); renderRaw(); renderGuide(); renderStats();
</script>
</body>
</html>
